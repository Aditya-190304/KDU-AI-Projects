pipeline:
  save_debug_images: false
  enable_medical_ner: true
  device: cpu

chroma:
  enabled: true
  persist_directory: data/chroma
  collection_name: medical-document-chunks
  distance_metric: cosine

keyword_index:
  enabled: true
  persist_path: data/keyword_index.db
  table_name: medical_document_chunks

chunking:
  enabled: true
  write_chunk_file: true
  use_semantic_layer: false
  overlap_tokens: 40
  embedding_model: BAAI/bge-small-en-v1.5
  local_files_only: true

storage:
  s3:
    enabled: true
    bucket: aditya-nigam-medical-rag
    region: ap-southeast-1
    profile: KDU-Developer-743298171118
    kms_key_id: alias/Aditya-NIgam-KMS
    prefix: documents

privacy:
  enabled: true
  hmac_secret_env_var: MEDICAL_RAG_HMAC_SECRET
  dev_fallback_secret: medical-rag-dev-secret-change-me
  presidio_language: en
  presidio_spacy_model: en_core_web_sm

indexing:
  enabled: true
  upload_extraction_artifacts_to_s3: true
  upload_raw_chunks_to_s3: true
  index_embeddings: true
  embedding_model: text-embedding-3-small
  embedding_dimensions: 1536
  batch_size: 32
  timeout_seconds: 60

retrieval:
  enabled: true
  embedding_model: text-embedding-3-small
  embedding_dimensions: 1536
  timeout_seconds: 60
  candidate_k: 20
  prescription_candidate_k: 30
  prescription_candidate_floor: 8
  prescription_rerank_k: 20
  prescription_anchor_k: 5
  top_k: 5
  hybrid:
    enabled: true
    rrf_k: 60
    semantic_weight: 1.0
    keyword_weight: 1.0
    section_boost: 0.25
    medication_text_boost: 0.2
    document_affinity_boost: 0.35
    document_exact_phrase_boost: 0.35
    prescription_boilerplate_penalty: 0.2
    bm25_k1: 1.5
    bm25_b: 0.75
  rerank:
    enabled: true
    model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
    local_files_only: true
    max_length: 512
    batch_size: 8

audit:
  enabled: true
  required: true
  backend: dynamodb
  table_name: medical-rag-access-audit
  region: us-east-1
  endpoint_url: http://127.0.0.1:8000
  tenant_key: audit
  page_size: 10
